{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="container mx-auto px-4 py-8">
    <!-- Encabezado -->
    <div class="flex items-center justify-between mb-6">
        <h1 class="text-3xl font-bold">Perfil de Usuario</h1>
        {% if can_edit %}
            <button class="btn btn-primary"
                    hx-get="{% url 'users:profile_edit' %}"
                    hx-target="#edit-profile-form-content"
                    hx-swap="innerHTML">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/>
                </svg>
                Editar Perfil
            </button>
        {% endif %}
    </div>

    <!-- Contenido del Perfil -->
    <div id="profile-content">
        {% include "users/partials/profile_detail.html" %}
    </div>
</div>

{% if can_edit %}
{% include "users/partials/profile_edit_modal.html" %}
{% endif %}
{% endblock %}
