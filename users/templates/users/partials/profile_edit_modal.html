<dialog id="edit_profile_modal" class="modal">

        <form method="dialog">
            <button class="btn btn-sm btn-circle btn-ghost absolute right-2 top-2" aria-label="Cerrar">✕</button>
        </form>
        <h3 class="font-bold text-lg mb-4">Editar Perfil</h3>
        <div id="edit-profile-form-content" data-modal-target="edit_profile_modal">
            {% include "users/partials/profile_edit_form.html" %}
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button aria-label="Cerrar modal">close</button>
    </form>
</dialog>
