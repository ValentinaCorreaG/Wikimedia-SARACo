{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-error/10 to-warning/10">
    <div class="card w-full max-w-md bg-base-100 shadow-2xl">
        <div class="card-body text-center">
            <!-- Header -->
            <h1 class="text-3xl font-bold text-error mb-2">Acceso Denegado</h1>
            <p class="text-base-content/70 mb-6">Error 403</p>

            <!-- Message -->
            <div class="alert alert-error mb-6">
                <div class="flex gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 flex-shrink-0" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a2 2 0 11-4 0 2 2 0 014 0zm0 0a2 2 0 11-4 0 2 2 0 014 0z" />
                    </svg>
                    <div class="text-left">
                        <p class="font-semibold">Permisos Insuficientes</p>
                        <p class="text-sm">Tu cuenta no tiene los permisos necesarios para realizar esta acción.</p>
                    </div>
                </div>
            </div>

            <!-- Actions -->
            <div class="flex flex-col gap-3">
                <button 
                    type="button"
                    onclick="history.back()"
                    class="btn btn-outline">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    Volver Atrás
                </button>
                <a href="{% url 'base' %}" class="btn btn-ghost">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M3 12l2-3m0 0l7-4 7 4M5 9v10a1 1 0 001 1h12a1 1 0 001-1V9m-9 11l4-4m0 0l4 4m-4-4v4" />
                    </svg>
                    Ir al Inicio
                </a>
                <hr class="my-2" />
                <a href="{% url 'users:logout' %}" class="btn btn-error btn-sm">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                    </svg>
                    Cerrar Sesión
                </a>
            </div>

            <p class="text-base-content/60 text-xs mt-6">
                ¿Necesitas ayuda? Contacta a 
                <a href="mailto:monica.bonilla@wikimediacolombia.org" class="link link-secondary">Soporte</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
