{% extends 'base.html' %}
{% load static %}

{% block title %}Lista de Eventos{% endblock %}

{% block content %}
<div class="container mx-auto px-6 py-10">

    <div class="flex justify-between items-center mb-8">
        <h1 class="text-3xl font-bold">Gestor de Eventos </h1>

        {% if user.is_superuser %}
        <button class="btn btn-primary w-40"
                hx-get="{% url 'create_event' %}"
                hx-target="#modal-box-content"
                hx-trigger="click"
                onclick="document.getElementById('modal-container').showModal()">
            + Nuevo Evento
        </button>
        {% endif %}
    </div>
    
        <!-- Calendar vs list view navigation -->
        <div class="mb-4 flex gap-3">
            <a href="{% url 'calendar' %}" 
               class="px-6 py-2.5 bg-white text-blue-700 border-2 border-blue-300 rounded-lg hover:bg-blue-50 transition-colors shadow-md hover:shadow-lg">
                <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>
                </svg>
                Vista Calendario
            </a>
            <a href="{% url 'event_list' %}" class="btn btn-primary">
                <svg class="w-5 h-5 inline-block mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"/>
                </svg>
                Vista Lista
            </a>
        </div>

        <!-- Search + filtros -->
        <div class="mb-6 flex flex-col sm:flex-row gap-3 sm:gap-4 items-stretch sm:items-center">
            <div class="w-full sm:w-96">
                <input type="text" 
                   name="busqueda" 
                   placeholder="Buscar eventos..."
                   class="w-full sm:w-96 px-4 py-2 border border-primary-200 rounded-lg focus:ring-2 focus:ring-primary-300 focus:border-transparent"
                   hx-get="{% url 'event_list' %}"
                   hx-trigger="keyup delay:300ms"
                   hx-target="#event-list"
                   hx-include="[name='busqueda'],[name='proyecto']">
            </div>
            <select name="proyecto"
                    class="w-full sm:w-48 px-4 py-2 border border-primary-200 rounded-lg focus:ring-2 focus:ring-primary-300 focus:border-transparent"
                    hx-get="{% url 'event_list' %}"
                    hx-trigger="change"
                    hx-target="#event-list"
                    hx-include="[name='busqueda'],[name='proyecto']">
                <option value="">-- Todos los proyectos --</option>
                {% for project in projects %}
                <option value="{{ project.id }}" {% if request.GET.proyecto|add:'0' == project.id|add:'0' %}selected{% endif %}>
                    {{ project.name }}
                </option>
                {% endfor %}
            </select>
        </div>

        <!-- Event list (HTMX swaps this area) -->
        <div id="event-list">
            {% include 'calendar/partials/event_list.html' %}
        </div>

    </div>


<!-- DaisyUI modal -->
<dialog id="modal-container" class="modal">
    <div class="modal-box w-11/12 max-w-2xl max-h-[90vh] overflow-y-auto relative">
        <form method="dialog" class="absolute right-2 top-2">
            <button type="submit" class="btn btn-sm btn-circle btn-ghost" aria-label="Cerrar">✕</button>
        </form>
        <div id="modal-box-content" data-modal-target="modal-container">
            <!-- HTMX swaps content here -->
        </div>
    </div>
    <form method="dialog" class="modal-backdrop">
        <button></button>
    </form>
</dialog>

{% endblock %}
