<h3 class="font-bold text-lg mb-4">Confirmar eliminación</h3>
<p class="py-4">
    ¿Estás seguro de que deseas eliminar la actividad <strong>{{ activity.nombre }}</strong>?
</p>
<p class="text-sm text-base-content/60 mb-2">
    <span class="font-medium">Fecha:</span> {{ activity.fecha|date:"d/m/Y" }}
</p>

<p class="text-sm text-base-content/60 mb-4">
    Esta acción no se puede deshacer.
</p>

<div class="modal-action">
    <form method="dialog">
        <button class="btn btn-ghost">Cancelar</button>
    </form>
    <form hx-post="{% url 'activity_delete' activity.pk %}"
          hx-target="#activity-list"
          hx-swap="innerHTML">
        {% csrf_token %}
        <button type="submit" class="btn btn-error">Eliminar</button>
    </form>
</div>
